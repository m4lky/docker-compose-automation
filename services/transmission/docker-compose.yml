services:
  transmission:
    image: lscr.io/linuxserver/transmission
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/London
       # TRANSMISSION_WEB_HOME=/combustion-release/
    volumes:
      - /home/malcolm/docker-volumes/transmission/config:/config
      - /home/malcolm/truenas/Downloads:/downloads
      - /home/malcolm/docker-volumes/transmission/watch:/watch
    ports:
      - 9098:9091
      - 51413:51413
      - 51413:51413/udp
    restart: unless-stopped
