services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    ports:
      - "9099:8080"
    restart: unless-stopped
    volumes:
      - /home/malcolm/docker-volumes/jenkins:/var/jenkins_home
  ssh-agent:
    image: jenkins/ssh-agent
    container_name: jenkins-ssh-agent
    restart: unless-stopped
